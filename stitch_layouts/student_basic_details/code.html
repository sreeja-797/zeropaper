<style>

<div class="flex items-center justify-between px-2">

<div class="w-8 h-8 rounded-full bg-secondary text-on-secondary flex items-center justify-center text-label-sm font-bold">1</div>
<span class="text-label-sm font-bold text-secondary">Basic Info</span>
</div>
<div class="flex-grow h-[2px] mx-4 bg-outline-variant relative">
<div class="absolute inset-0 w-0 bg-secondary transition-all duration-500"></div>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center text-label-sm font-bold">2</div>
<span class="text-label-sm text-on-surface-variant">Education</span>
</div>
<div class="flex-grow h-[2px] mx-4 bg-outline-variant"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center text-label-sm font-bold">3</div>
<span class="text-label-sm text-on-surface-variant">Verify</span>
</div>
</div>
</section>
<!-- Header Content -->
<div class="mb-stack-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-2">Build Your Digital Identity</h1>
<p class="text-body-lg text-on-surface-variant">We'll use these details to match you with top-tier enterprise recruiters. Make sure everything is up to date.</p>
</div>
<!-- Form Section -->
<form class="space-y-stack-lg">
<!-- Photo Upload Area -->
<div class="bg-surface-container-lowest surface-card rounded-xl p-stack-lg flex flex-col items-center justify-center text-center">
<div class="relative group cursor-pointer">
<div class="w-24 h-24 rounded-full bg-surface-container flex items-center justify-center overflow-hidden border-2 border-dashed border-outline-variant group-hover:border-secondary transition-colors">
<span class="material-symbols-outlined text-4xl text-on-surface-variant group-hover:text-secondary">add_a_photo</span>
</div>
<div class="absolute bottom-0 right-0 bg-secondary text-on-secondary p-1.5 rounded-full shadow-lg">
<span class="material-symbols-outlined text-sm">edit</span>
</div>
</div>
<h3 class="mt-4 font-label-md text-label-md text-on-surface">Profile Photo</h3>
<p class="text-body-sm text-on-surface-variant mt-1">PNG, JPG up to 5MB</p>
</div>
<!-- Identity Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">First Name</label>
<input class="w-full bg-[#F1F5F9] border-none rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-secondary/20" placeholder="e.g. Alex" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Last Name</label>
<input class="w-full bg-[#F1F5F9] border-none rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-secondary/20" placeholder="e.g. Rivers" type="text"/>
</div>
</div>
<!-- Demographics Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Gender</label>
<select class="w-full bg-[#F1F5F9] border-none rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-secondary/20 appearance-none">
<option value="">Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Non-binary</option>
<option value="prefer_not">Prefer not to say</option>
</select>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Date of Birth</label>
<input class="w-full bg-[#F1F5F9] border-none rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-secondary/20" type="date"/>
</div>
</div>
<!-- Contact Section -->
<div class="bg-surface-container-lowest surface-card rounded-xl p-stack-lg space-y-stack-md">
<h2 class="font-headline-md text-headline-md text-on-surface border-b border-outline-variant pb-2">Contact Details</h2>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Phone Number</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined text-xl">call</span>
<input class="w-full bg-[#F1F5F9] border-none rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-2 focus:ring-secondary/20" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Email Address</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined text-xl">mail</span>
<input class="w-full bg-[#F1F5F9] border-none rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-2 focus:ring-secondary/20" type="email" value="alex.rivers@university.edu"/>
</div>
</div>
<div class="grid grid-cols-2 gap-stack-md">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">City</label>
<input class="w-full bg-[#F1F5F9] border-none rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-secondary/20" placeholder="San Francisco" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">State</label>
<input class="w-full bg-[#F1F5F9] border-none rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-secondary/20" placeholder="CA" type="text"/>
</div>
</div>
</div>
<!-- Professional URLs -->
<div class="bg-surface-container-lowest surface-card rounded-xl p-stack-lg space-y-stack-md">
<h2 class="font-headline-md text-headline-md text-on-surface border-b border-outline-variant pb-2">Professional Links</h2>
<div class="space-y-2">
<div class="relative flex items-center">
<div class="absolute left-4 flex items-center gap-2">

</div>
<input class="w-full bg-[#F1F5F9] border-none rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-2 focus:ring-secondary/20" placeholder="linkedin.com/in/username" type="url"/>
</div>
</div>
<div class="space-y-2">
<div class="relative flex items-center">
<div class="absolute left-4 flex items-center gap-2">
<img alt="GitHub" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCb0-NlE66fn9IPRDrmwX0gKsAwvedSGN_1vzB0908TlLFsOHrtPSz4AA-c-4z1yBQY1BQZ-3qvfx7tl_akfuJKEe7hxvQPmK_Q8gtGWmxEBU3Kqi6JAGvVDY-QePPcsLRzCpJORwWtvACWMoKnI0HaTvRG7JSmGRNRtm4pUiwPmlgxZ8H81tB3DbMi8VQgZLqFgGGWBm7nCtuMuwjJZ4cC1BZ5XCtUu-YGusVQDvwRSWt-barE2kESW1j3rA_ftbqABz0MJnP5GuF8"/>
</div>
<input class="w-full bg-[#F1F5F9] border-none rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-2 focus:ring-secondary/20" placeholder="github.com/username" type="url"/>
</div>
</div>
<div class="space-y-2">
<div class="relative flex items-center">
<div class="absolute left-4 flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-xl">language</span>
</div>
<input class="w-full bg-[#F1F5F9] border-none rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-2 focus:ring-secondary/20" placeholder="portfolio-site.com" type="url"/>

</form>
</main>
<!-- Sticky Bottom Action Container -->
<div class="fixed bottom-0 left-0 w-full glass-sticky px-margin-mobile py-6 border-t border-outline-variant z-50">
<div class="md:max-w-3xl md:mx-auto flex gap-4">
<button class="flex-1 py-4 px-6 bg-surface-container-high text-on-surface-variant font-label-md text-label-md rounded-xl hover:opacity-80 transition-opacity active:scale-95 duration-100">
                Cancel
            </button>
<button class="flex-[2] py-4 px-6 bg-secondary text-on-secondary font-label-md text-label-md rounded-xl shadow-lg shadow-secondary/20 hover:opacity-90 transition-opacity active:scale-95 duration-100 flex items-center justify-center gap-2">
                Save &amp; Continue
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</div>
<!-- Micro-interaction JS -->
<script>
        // Placeholder for future form logic
        document.querySelectorAll('input, select').forEach(input => {
            input.addEventListener('focus', () => {
                // Potential for adding floating label effects or highlighting the section
            });
        });

        // Toggle sticky container shadow on scroll
        window.addEventListener('scroll', () => {
            const footer = document.querySelector('.glass-sticky');
            if (window.scrollY > 10) {
                footer.classList.add('shadow-2xl');
            } else {
                footer.classList.remove('shadow-2xl');
            }
        });
    </script>
<!-- Background Decoration for Style -->
<div class="fixed -top-24 -right-24 w-64 h-64 bg-secondary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed top-1/2 -left-24 w-48 h-48 bg-tertiary-fixed/10 rounded-full blur-3xl -z-10"></div>
</body></html>
