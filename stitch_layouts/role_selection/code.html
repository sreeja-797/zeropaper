<body class="bg-background min-h-screen text-on-surface flex flex-col">
<!-- Header (Suppressed Nav - Transactional Screen) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 backdrop-blur-xl bg-surface/70">
<div class="font-headline-md text-headline-md font-bold text-secondary">Zero-Paper</div>
<button class="material-symbols-outlined text-on-surface-variant p-2 rounded-full hover:bg-surface-container-high transition-colors" data-icon="help">
            help
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-12 px-margin-mobile flex flex-col items-center max-w-lg mx-auto w-full">
<!-- Illustration Section -->
<div class="w-full mb-stack-lg relative">
<div class="aspect-video w-full rounded-[24px] overflow-hidden bg-surface-container shadow-sm border border-outline-variant/30">
<img class="w-full h-full object-cover" data-alt="A professional 3D illustration featuring a group of diverse, ambitious university students and a corporate recruiter shaking hands digitally. The scene is bathed in a soft, high-key light mode aesthetic with a clean white and royal blue color palette. Background elements include minimalist geometric representations of skyscrapers and campus gates. The mood is optimistic, energetic, and highly professional, reflecting a modern corporate SaaS platform." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBe_d8ouZteC0K2hVP_E6Y6_-9Bk3eKcfZt0gZFuiPYGB15TorhbjEhVW1TJmVb0xAf5ooW1V9sM2Y280qvuwaMUlATaFi1asXQgVHcpktNdAnWlzKJCLu7ac3oVGvSs5Xw21BdneE4XxuI7WwUuTWeS4X76TRpqpjtutLJWiA6FL7jo7AbxFwP3M5J2wsZNrNgIxkG0kHZRu0It81dLVne93UHnyGfZtDbYDHM8_-banUkxeRlzUH3rqLMGJVm6ZWlQqT7MhLgFxlJ"/>
</div>
<!-- Atmospheric Glow -->
<div class="absolute -z-10 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-secondary/10 blur-[80px] rounded-full"></div>
</div>
<!-- Typography Section -->
<div class="text-center mb-10 space-y-3">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary tracking-tight">
                Choose your path
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto">
                Connecting campus talent with top recruiters instantly.
            </p>
</div>
<!-- Selection Cards -->
<div class="w-full space-y-stack-md">
<!-- Student Option -->
<button class="selection-card w-full group text-left p-gutter bg-surface-container-lowest border border-outline-variant rounded-[24px] shadow-sm hover:shadow-lg hover:border-secondary transition-all duration-300 flex items-center gap-gutter active:scale-[0.98]">
<div class="w-14 h-14 rounded-2xl bg-secondary/10 flex items-center justify-center text-secondary group-hover:bg-secondary group-hover:text-on-secondary transition-colors">
<span class="material-symbols-outlined text-[28px]" data-icon="school">school</span>
</div>
<div class="flex-grow">
<h3 class="font-headline-md text-headline-md text-on-surface mb-1">Continue as Student</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">Find internships and start your career</p>
</div>
<span class="material-symbols-outlined arrow-icon text-on-surface-variant transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Recruiter Option -->
<button class="selection-card w-full group text-left p-gutter bg-surface-container-lowest border border-outline-variant rounded-[24px] shadow-sm hover:shadow-lg hover:border-secondary transition-all duration-300 flex items-center gap-gutter active:scale-[0.98]">
<div class="w-14 h-14 rounded-2xl bg-primary/5 flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors">
<span class="material-symbols-outlined text-[28px]" data-icon="business_center">business_center</span>
</div>
<div class="flex-grow">
<h3 class="font-headline-md text-headline-md text-on-surface mb-1">Continue as Recruiter</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">Access top talent and manage hiring</p>
</div>
<span class="material-symbols-outlined arrow-icon text-on-surface-variant transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Footer Help -->
<div class="mt-12 text-center">
<p class="font-label-md text-label-md text-on-surface-variant">
                Already have an account? 
                <a class="text-secondary font-bold hover:underline" href="#">Log in</a>
</p>
</div>
</main>
