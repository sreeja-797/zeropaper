<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Zero-Paper QR Scanner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes scan-line {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(280px); opacity: 0; }
        }
        .scanner-laser {
            animation: scan-line 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            background: linear-gradient(to bottom, transparent, #acedff, transparent);
            box-shadow: 0 0 15px 2px rgba(172, 237, 255, 0.6);
        }
        .glass-overlay {
            backdrop-filter: blur(4px);
            background: rgba(13, 28, 50, 0.4);
        }
        .scanner-corner {
            width: 32px;
            height: 32px;
            border-color: #acedff;
            position: absolute;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#dbe1ff",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",
                    "on-secondary-fixed-variant": "#003ea8",
                    "error": "#ba1a1a",
                    "on-background": "#191c1e",
                    "primary-container": "#0d1c32",
                    "on-secondary-container": "#fefcff",
                    "on-primary-container": "#76849f",
                    "outline-variant": "#c5c6cd",
                    "surface-container-high": "#e6e8ea",
                    "on-primary-fixed": "#0d1c32",
                    "on-primary-fixed-variant": "#39475f",
                    "on-surface": "#191c1e",
                    "on-tertiary-fixed-variant": "#004e5c",
                    "surface-bright": "#f7f9fb",
                    "surface-dim": "#d8dadc",
                    "on-primary": "#ffffff",
                    "on-secondary-fixed": "#00174b",
                    "surface": "#f7f9fb",
                    "background": "#f7f9fb",
                    "tertiary-fixed": "#acedff",
                    "tertiary-container": "#001f26",
                    "on-surface-variant": "#44474d",
                    "secondary-fixed-dim": "#b4c5ff",
                    "outline": "#75777e",
                    "on-tertiary": "#ffffff",
                    "surface-container": "#eceef0",
                    "primary-fixed-dim": "#b9c7e4",
                    "on-secondary": "#ffffff",
                    "primary-fixed": "#d6e3ff",
                    "secondary-container": "#316bf3",
                    "on-error-container": "#93000a",
                    "tertiary": "#000000",
                    "secondary": "#0051d5",
                    "inverse-primary": "#b9c7e4",
                    "inverse-surface": "#2d3133",
                    "on-tertiary-fixed": "#001f26",
                    "surface-variant": "#e0e3e5",
                    "primary": "#000000",
                    "error-container": "#ffdad6",
                    "inverse-on-surface": "#eff1f3",
                    "on-tertiary-container": "#0090a9",
                    "surface-tint": "#515f78",
                    "surface-container-highest": "#e0e3e5",
                    "surface-container-low": "#f2f4f6",
                    "tertiary-fixed-dim": "#4cd7f6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "20px",
                    "base": "4px",
                    "gutter": "16px",
                    "stack-md": "16px",
                    "margin-desktop": "40px",
                    "stack-sm": "8px",
                    "stack-lg": "24px"
            },
            "fontFamily": {
                    "label-md": ["Inter"],
                    "body-sm": ["Inter"],
                    "headline-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-sm": ["Inter"]
            },
            "fontSize": {
                    "label-md": ["14px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary-container overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 backdrop-blur-xl bg-surface/10">
<button aria-label="Back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-white">close</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-white tracking-tight">Zero-Paper</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Camera Viewport Mockup -->
<main class="relative h-screen w-full flex items-center justify-center">
<!-- Mock Camera Feed Background -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="A first-person view of a high-end corporate office lobby with polished marble floors and minimalist wood paneling. The environment is captured in soft, high-key natural lighting, creating a bright and clean professional atmosphere. The scene serves as a realistic background for a camera-view interface, featuring a subtle Royal Blue and Cyan color palette consistent with a modern SaaS recruitment application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsxDXoM1j5LTlFmqg_MKp80O37B1ZY-xTzwJdrYjU7rPuzQvAeczdUcwSMD57YbH6HbvZYAjWtkCdpm6RVwBu80N3pSsd8JB0cj-dsialJpljrViBRJb6KEtAgImL4o6mboGZP7kjATM_cIU4rI4F6oYVcBu7HfVp4T4YGwGiQDiSxBxLPB15278ZZ1dUnoKqU6Hg9ZmrBgByZgUXlzmOSGFmVRtFVPhOOkG3ExpalGldfEnMmyQ6Cv267Jh1p2k7hrh6LA4FemBMQ"/>
</div>
<!-- Scanning Overlay Layer -->
<div class="absolute inset-0 z-10 glass-overlay flex flex-col items-center justify-center">
<!-- Scanning Frame Container -->
<div class="relative w-72 h-72 md:w-80 md:h-80">
<!-- Frame Corners -->
<div class="scanner-corner border-t-4 border-l-4 top-0 left-0 rounded-tl-xl"></div>
<div class="scanner-corner border-t-4 border-r-4 top-0 right-0 rounded-tr-xl"></div>
<div class="scanner-corner border-b-4 border-l-4 bottom-0 left-0 rounded-bl-xl"></div>
<div class="scanner-corner border-b-4 border-r-4 bottom-0 right-0 rounded-br-xl"></div>
<!-- Central Laser -->
<div class="scanner-laser absolute top-0 left-0 right-0 h-1 z-20"></div>
<!-- QR Icon Indicator (Faint) -->
<div class="absolute inset-0 flex items-center justify-center opacity-10">
<span class="material-symbols-outlined text-[120px] text-tertiary-fixed">qr_code_2</span>
</div>
</div>
<!-- Instruction Text -->
<div class="mt-stack-lg text-center px-8">
<p class="font-body-lg text-body-lg text-white mb-2">Align QR Code within frame</p>
<p class="font-label-sm text-label-sm text-tertiary-fixed-dim uppercase tracking-widest">Scanning for student identity...</p>
</div>
</div>
<!-- Floating Action Utilities -->
<div class="absolute bottom-32 left-0 w-full z-30 flex justify-center gap-stack-lg px-margin-mobile">
<button class="flex flex-col items-center gap-base transition-transform active:scale-90" id="flashToggle">
<div class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/20 hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-white">flashlight_on</span>
</div>
<span class="font-label-sm text-label-sm text-white">Flash</span>
</button>
<button class="flex flex-col items-center gap-base transition-transform active:scale-90">
<div class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/20 hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-white">image</span>
</div>
<span class="font-label-sm text-label-sm text-white">Gallery</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-margin-mobile py-3 pb-safe backdrop-blur-xl border-t border-outline-variant bg-surface/10 shadow-lg">
<a class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-5 py-1 scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-label-sm text-label-sm">QR Scan</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</a>
</nav>
<!-- Interactive Micro-interactions -->
<script>
        const flashBtn = document.getElementById('flashToggle');
        let flashOn = false;

        flashBtn.addEventListener('click', () => {
            flashOn = !flashOn;
            const icon = flashBtn.querySelector('.material-symbols-outlined');
            icon.textContent = flashOn ? 'flashlight_off' : 'flashlight_on';
            icon.style.color = flashOn ? '#acedff' : '#ffffff';
            
            // Haptic-like feedback visual
            flashBtn.classList.add('scale-110');
            setTimeout(() => flashBtn.classList.remove('scale-110'), 150);
        });

        // Simulate successful scan effect randomly
        setInterval(() => {
            if (Math.random() > 0.95) {
                const frame = document.querySelector('.relative.w-72');
                frame.classList.add('ring-4', 'ring-tertiary-fixed', 'duration-300');
                setTimeout(() => frame.classList.remove('ring-4', 'ring-tertiary-fixed'), 400);
            }
        }, 3000);
    </script>
</body></html>
