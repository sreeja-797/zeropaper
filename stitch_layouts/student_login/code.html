  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-lg text-body-lg overflow-x-hidden">
<!-- TopAppBar Fragment (Suppressing Nav for Linear Flow) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 backdrop-blur-xl bg-surface/70">
<div class="font-headline-md text-headline-md font-bold text-secondary">Zero-Paper</div>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-full">
<span class="material-symbols-outlined">help</span>
</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center pt-16 pb-8 px-margin-mobile">
<div class="w-full max-w-[440px] flex flex-col gap-stack-lg">
<!-- Hero Branding Section -->
<div class="text-center md:text-left">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Access your zero-paper recruitment profile and career opportunities.</p>
</div>
<!-- Login Form Card -->
<div class="bg-surface-container-lowest border border-outline-variant p-6 md:p-8 rounded-[24px] login-card-shadow">
<form class="flex flex-col gap-stack-md" id="loginForm">
<!-- Email Field -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">University Email</label>
<input class="w-full bg-surface-container-low border-none rounded-lg h-12 px-4 focus:ring-2 focus:ring-secondary transition-all outline-none" id="email" name="email" placeholder="alex.rivers@university.edu" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-stack-sm">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg h-12 px-4 focus:ring-2 focus:ring-secondary transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant p-1" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center gap-3 py-2">
<input class="w-5 h-5 rounded border-outline text-secondary focus:ring-secondary cursor-pointer" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<!-- CTA -->
<button class="w-full h-12 bg-secondary text-on-secondary font-label-md text-label-md rounded-full hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2" type="submit">
                        Login to Dashboard
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm text-label-sm">
<span class="px-4 bg-surface-container-lowest text-on-surface-variant">OR CONTINUE WITH</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-12 border border-outline-variant rounded-lg hover:bg-surface-container transition-colors">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAzJvsjj1COGEQAxA0dbWmSz9V0tY9GwPC3ZiAQVOBWjQ9utLFB8TMsedrzb9cuRRqDYZvVXYf9Mi_QG3aFXimaxHZoWl_fbk8CZ-wB0CfJKd_u5viwHaEcWG8V2zYcOAt-W_tzuGqvGV2kKXwMpuMAqBqa9E2bJYhFZI5oewQvxiMd2E3kJKta2ZL0KokimPK_U6o4zqT3IiEeJDZDZGTvRQZFMqDi2cep02tScxxA3WOafKiRmduorbY0ABPiUEDARvGcn6QF5UBY"/>
<span class="font-label-md text-label-md">Google</span>
</button>
<button class="flex items-center justify-center gap-2 h-12 border border-outline-variant rounded-lg hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[#0077B5]">group</span>
<span class="font-label-md text-label-md">LinkedIn</span>
</button>
</div>
</div>
<!-- Redirect -->
<p class="text-center font-body-lg text-body-lg text-on-surface-variant">
                Don't have an account? 
                <a class="text-secondary font-bold hover:underline" href="#">Sign up for free</a>
</p>
</div>
</main>
<!-- Visual Background Element -->
<div class="fixed top-0 right-0 -z-10 w-1/2 h-full hidden lg:block opacity-10">
<div class="w-full h-full bg-gradient-to-bl from-secondary/20 to-transparent"></div>
<img class="absolute inset-0 w-full h-full object-cover" data-alt="A group of diverse university students laughing and studying together in a bright, modern glass-walled library. The setting is filled with natural high-key sunlight and minimalist white furniture, creating an atmosphere of collaborative enterprise and academic prestige. The image follows a corporate SaaS aesthetic with soft diffused shadows and a clean, high-contrast light mode palette." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2xoaQq7NpfTXJp-39TNTjwUzH5Q_VgZhWvQ5sqdrw5NODzoz23in1YKW-g0a4vh_fCGlV3Hi34UkgsqylIMAKUJWxXTGxOWIe8GriB7-7bvUHBVKLJH5ttR2CXZKqjrzybsI5ReWMo73uQL4Tk6UYEQgKxm0irQ4tnd-MKE9q6Hh_ePmYkyhNimpHQ2F5-g_meg9JRjs6Y9u5HAGaluxjuwx-oJg0xWRqaBLZepO-boTdqJwiVppy51WgFr32lxV-U4BfEcna1vVm"/>
</div>
<!-- Micro-interaction Scripts -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                passwordIcon.innerText = 'visibility';
            }
        }

        // Form submission animation
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                alert('Demo Login Success: Navigating to Dashboard...');
            }, 1500);
        });

        // Simple parallax on mouse move for bg image (Desktop only)
        if (window.innerWidth > 1024) {
            document.addEventListener('mousemove', (e) => {
                const img = document.querySelector('img[data-alt]');
                const x = (window.innerWidth - e.pageX * 2) / 100;
                const y = (window.innerHeight - e.pageY * 2) / 100;
                img.style.transform = `translateX(${x}px) translateY(${y}px) scale(1.05)`;
            });
        }
    </script>
</body></html>
