<div class="flex justify-between items-center mb-stack-md">
<h2 class="font-headline-md text-headline-md-mobile md:text-headline-md text-on-surface">Education Details</h2>
<span class="font-label-sm text-label-sm text-secondary bg-secondary-fixed px-3 py-1 rounded-full">Step 2 of 4</span>
</div>
<div class="w-full bg-surface-container-high h-2 rounded-full overflow-hidden">
<div class="bg-secondary h-full w-1/2 rounded-full"></div>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-stack-sm">Fill in your academic background to build your verified profile.</p>
</section>
<!-- Timeline Section -->
<div class="relative education-timeline pl-8 space-y-stack-lg">
<!-- University Section (Active) -->
<section class="relative">
<div class="absolute -left-8 top-1.5 w-6 h-6 bg-secondary rounded-full flex items-center justify-center z-10 border-4 border-surface ring-2 ring-secondary-fixed">
<span class="material-symbols-outlined text-[14px] text-on-secondary" data-icon="school" data-weight="fill">school</span>
</div>

<button class="w-full flex items-center justify-between p-stack-lg text-left" onclick="toggleSection('university-content', 'university-icon')">
<div>

<p class="font-label-sm text-label-sm text-secondary">Ongoing • Graduation 2024</p>

</button>
<div class="px-stack-lg pb-stack-lg space-y-stack-md block" id="university-content">
<div class="space-y-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant">Institution Name</label>
<input class="w-full bg-surface-container-low border-none rounded-lg p-3 font-body-lg text-body-lg focus:ring-2 focus:ring-secondary/20 transition-all outline-none" type="text" value="Silicon Valley Institute of Technology"/>

<div class="grid grid-cols-2 gap-stack-md">

<option>8th Semester</option>
</select>
</div>
</div>
<div class="grid grid-cols-2 gap-stack-md">
<div class="space-y-stack-sm">

</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all duration-300">

<div class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-5 py-1">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</div>
</nav>
<script>
        function toggleSection(contentId, iconId) {
            const content = document.getElementById(contentId);
            const icon = document.getElementById(iconId);
            
            // Toggle visibility
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                content.classList.add('block');
                icon.classList.add('rotate-180');
            } else {
                content.classList.add('hidden');
                content.classList.remove('block');
                icon.classList.remove('rotate-180');
            }
        }

        // Interaction for input focus effects
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.classList.add('scale-[1.01]');
            });
            el.addEventListener('blur', () => {
                el.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
