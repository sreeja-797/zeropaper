<style>
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-shimmer {
            position: relative;
            overflow: hidden;
        }
        .animate-shimmer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            animation: shimmer 2s infinite;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-primary-container text-on-primary-container min-h-screen flex flex-items-center justify-center overflow-hidden">
<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none opacity-20">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-secondary-container blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-on-tertiary-container blur-[120px] rounded-full opacity-40"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center px-margin-mobile text-center">
<!-- Animated Brand Container -->
<div class="mb-stack-lg transform transition-all duration-1000 ease-out" id="brand-logo">
<div class="w-24 h-24 md:w-32 md:h-32 bg-secondary-container rounded-[28%] flex items-center justify-center shadow-2xl mb-stack-md mx-auto group">
<span class="material-symbols-outlined text-[48px] md:text-[64px] text-white transition-transform duration-500 group-hover:scale-110" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-white mb-base tracking-tight">
                Zero-Paper
            </h1>
<p class="font-body-lg text-body-lg text-on-primary-container/80 max-w-xs mx-auto">
                Paperless Campus Recruitment Experience
            </p>
</div>
<!-- Loading UI -->
<div class="mt-stack-lg w-full max-w-[200px]">
<!-- Pulse Bar -->
<div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-secondary-container w-1/3 rounded-full animate-shimmer shadow-[0_0_12px_rgba(49,107,243,0.5)]"></div>
</div>
<!-- Status Label -->
<div class="mt-stack-sm flex items-center justify-center gap-2">
<span class="font-label-sm text-label-sm text-on-primary-container/60 uppercase tracking-widest">
                    Initializing
                </span>
<span class="flex gap-1">
<span class="w-1 h-1 bg-secondary-container rounded-full animate-bounce [animation-delay:-0.3s]"></span>
<span class="w-1 h-1 bg-secondary-container rounded-full animate-bounce [animation-delay:-0.15s]"></span>
<span class="w-1 h-1 bg-secondary-container rounded-full animate-bounce"></span>
</span>
</div>
</div>
<!-- Visual Anchor (Bottom) -->
<div class="fixed bottom-12 left-0 w-full flex justify-center opacity-40">
<div class="flex items-center gap-4">
<div class="h-[1px] w-8 bg-on-primary-container"></div>
<span class="font-label-sm text-label-sm text-on-primary-container">SECURE VERIFIED ID</span>
<div class="h-[1px] w-8 bg-on-primary-container"></div>
</div>
</div>
</main>
<!-- Background Image with data-alt -->
<div class="absolute inset-0 z-0 opacity-10 mix-blend-overlay">

<script>
        // Micro-interaction for the splash screen
        document.addEventListener('DOMContentLoaded', () => {
            const logo = document.getElementById('brand-logo');
            
            // Initial entrance animation
            logo.style.opacity = '0';
            logo.style.transform = 'translateY(20px) scale(0.95)';
            
            setTimeout(() => {
                logo.style.opacity = '1';
                logo.style.transform = 'translateY(0) scale(1)';
            }, 100);

            // Simulate transition to main app after 3.5 seconds
            /*
            setTimeout(() => {
                document.body.classList.add('transition-opacity', 'duration-700', 'opacity-0');
            }, 3000);
            */
        });
    </script>
